{% extends "base.html" %}

{% block title %}Chi tiet danh gia - COTRIPVn{% endblock %}

{% block content %}
<div class="container py-5">
    <a href="{% url 'reviews:list' %}" class="text-decoration-none">&larr; Reviews</a>
    <article class="mt-4">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h1 class="h3 mb-1">{{ review.title }}</h1>
                <p class="text-muted">{{ review.get_review_type_display }} review by {{ review.user.email }}</p>
            </div>
            <span class="badge text-bg-warning">{{ review.rating }}/5</span>
        </div>
        <p class="lead">{{ review.comment }}</p>
    </article>
</div>
{% endblock %}
