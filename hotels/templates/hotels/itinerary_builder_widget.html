<section class="trip-builder-widget panel mb-4" data-trip-builder>
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
        <div>
            <p class="text-primary fw-semibold mb-1">Tạo lịch trình du lịch</p>
            <h2 class="h5 mb-0">Nhập điểm đến, số ngày và ngân sách</h2>
        </div>
        <span class="badge text-bg-light" data-save-status>Chưa tạo</span>
    </div>

    <form class="row g-2 align-items-end" data-trip-builder-form>
        <div class="col-md-4">
            <label class="form-label small">Điểm đến</label>
            <input class="form-control" name="destination" type="text" placeholder="Ví dụ: Đà Nẵng" required>
        </div>
        <div class="col-6 col-md-2">
            <label class="form-label small">Số ngày</label>
            <input class="form-control" name="days" type="number" min="1" max="7" value="3">
        </div>
        <div class="col-6 col-md-2">
            <label class="form-label small">Số người</label>
            <input class="form-control" name="travelers" type="number" min="1" max="20" value="2">
        </div>
        <div class="col-6 col-md-2">
            <label class="form-label small">Ngân sách nhóm</label>
            <input class="form-control" name="budget" type="number" min="0" step="50000" placeholder="VND">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" type="submit">Tạo plan</button>
        </div>
    </form>

    {% if request.user.is_authenticated %}
    <div class="row g-2 align-items-end mt-3">
        <div class="col-md-8">
            <label class="form-label small">Lịch trình đã lưu</label>
            <select class="form-select" data-saved-itineraries>
                <option value="">Chọn lịch trình đã lưu để tiếp tục chỉnh sửa/đặt dịch vụ</option>
            </select>
        </div>
        <div class="col-md-4">
            <a class="btn btn-outline-primary w-100 disabled" href="#" data-open-saved-booking>Đặt theo lịch trình đã lưu</a>
        </div>
    </div>
    {% endif %}

    <div class="small text-muted mt-2">
        Sau khi tạo lịch trình gợi ý, bạn có thể chỉnh sửa, thay thế, thêm hoặc xóa hoạt động. Thay đổi sẽ tự lưu sau 1 giây.
    </div>

    <div class="trip-builder-result mt-4 d-none" data-trip-builder-result></div>
</section>

<style>
.trip-builder-editor { display: grid; gap: 16px; grid-template-columns: 180px minmax(0, 1fr); }
.trip-builder-days { border-right: 1px solid #edf0ef; padding-right: 14px; }
.trip-builder-day-btn { align-items: center; background: #fff; border: 1px solid #edf0ef; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 8px; padding: 10px; width: 100%; }
.trip-builder-day-btn.active { border-color: #13795b; color: #13795b; font-weight: 700; }
.trip-activity-card { border: 1px solid #edf0ef; border-radius: 8px; margin-bottom: 12px; padding: 12px; }
.trip-activity-card.dragging { opacity: .55; }
.trip-activity-grid { display: grid; gap: 10px; grid-template-columns: 36px 48px 120px minmax(0, 1fr) 160px 92px 36px; }
.trip-drag-handle { cursor: grab; text-align: center; }
.trip-activity-card textarea { min-height: 42px; resize: none; }
@media (max-width: 768px) {
    .trip-builder-editor { grid-template-columns: 1fr; }
    .trip-builder-days { border-bottom: 1px solid #edf0ef; border-right: 0; padding-bottom: 12px; padding-right: 0; }
    .trip-activity-grid { grid-template-columns: 32px 42px 1fr; }
    .activity-title, .activity-description, .activity-cost, .activity-replace, .activity-delete, .cost-preview { grid-column: 3; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('[data-trip-builder]').forEach(function(widget) {
        const form = widget.querySelector('[data-trip-builder-form]');
        const result = widget.querySelector('[data-trip-builder-result]');
        const saveStatus = widget.querySelector('[data-save-status]');
        const endpoint = "{% url 'hotels:itinerary_builder_api' %}";
        const savedEndpoint = "{% url 'hotels:saved_itineraries_api' %}";
        const editableEndpointTemplate = "{% url 'editable_itinerary_api' 0 %}";
        const icons = {attraction: '🏛', transport: '🚗', accommodation: '🏨', food: '🍜'};
        const typeLabels = {attraction: 'Attraction', transport: 'Transport', accommodation: 'Accommodation', food: 'Food'};
        const typeOrder = ['attraction', 'transport', 'accommodation', 'food'];
        let state = null;
        let itineraryId = null;
        let activeDayIndex = 0;
        let draggedIndex = null;
        let saveTimer = null;
        let replacementOptions = [];
        let suggestionOptions = [];
        let travelers = 1;
        let requestedBudget = 0;
        let savedItineraries = [];

        hydrateFromQueryString();
        loadSavedItineraries();

        function loadSavedItineraries() {
            const select = widget.querySelector('[data-saved-itineraries]');
            const bookingLink = widget.querySelector('[data-open-saved-booking]');
            if (!select) return;
            fetch(savedEndpoint, {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(response => response.ok ? response.json() : null)
                .then(function(data) {
                    if (!data || !data.ok) return;
                    savedItineraries = data.itineraries || [];
                    savedItineraries.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = `${item.title} - ${item.city} - ${item.days} ngày`;
                        option.dataset.bookUrl = item.book_url;
                        select.appendChild(option);
                    });
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('saved')) {
                        select.value = params.get('saved');
                        select.dispatchEvent(new Event('change'));
                    }
                })
                .catch(function() {});
            select.addEventListener('change', function() {
                const selected = select.options[select.selectedIndex];
                if (bookingLink) {
                    bookingLink.href = selected && selected.dataset.bookUrl ? selected.dataset.bookUrl : '#';
                    bookingLink.classList.toggle('disabled', !selected || !selected.value);
                }
                if (!select.value) return;
                fetch(editableEndpointTemplate.replace('/0/', `/${select.value}/`), {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                    .then(function(response) {
                        return response.json().then(function(data) {
                            if (!response.ok) throw data;
                            return data;
                        });
                    })
                    .then(function(data) {
                        state = data.itinerary;
                        itineraryId = state.id;
                        replacementOptions = data.replacement_options || [];
                        suggestionOptions = data.suggestion_options || [];
                        travelers = Number(form.elements.travelers.value || 1);
                        requestedBudget = Number(form.elements.budget.value || 0);
                        activeDayIndex = 0;
                        result.classList.remove('d-none');
                        renderEditor({
                            title: state.title,
                            destination: selected.textContent,
                            days: state.days.length,
                            travelers: travelers,
                            requested_budget: requestedBudget,
                        });
                        setSaveStatus('Đã tải', 'success');
                    })
                    .catch(function(error) {
                        result.classList.remove('d-none');
                        result.innerHTML = `<div class="alert alert-warning mb-0">${error.message || 'Không tải được lịch trình đã lưu.'}</div>`;
                    });
            });
        }

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const params = new URLSearchParams(new FormData(form));
            result.classList.remove('d-none');
            result.innerHTML = '<div class="text-muted">Đang tạo lịch trình...</div>';
            setSaveStatus('Đang tạo...', 'warning');

            fetch(`${endpoint}?${params.toString()}`, {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(function(response) {
                    return response.json().then(function(data) {
                        if (!response.ok) throw data;
                        return data;
                    });
                })
                .then(function(plan) {
                    if (!plan.editable_itinerary) {
                        result.innerHTML = '<div class="alert alert-warning mb-0">Bạn cần đăng nhập để chỉnh sửa lịch trình.</div>';
                        setSaveStatus('Chưa lưu', 'secondary');
                        return;
                    }
                    state = plan.editable_itinerary;
                    replacementOptions = plan.replacement_options || [];
                    suggestionOptions = plan.suggestion_options || [];
                    travelers = Number(plan.travelers || 1);
                    requestedBudget = Number(plan.requested_budget || 0);
                    itineraryId = state.id;
                    activeDayIndex = 0;
                    renderEditor(plan);
                    setSaveStatus('Đã lưu', 'success');
                })
                .catch(function(error) {
                    result.innerHTML = `<div class="alert alert-warning mb-0">${error.message || 'Không tạo được lịch trình.'}</div>`;
                    setSaveStatus('Lỗi', 'danger');
                });
        });

        function renderEditor(plan) {
            const budget = plan.requested_budget ? ` / Ngân sách nhóm: ${Number(plan.requested_budget).toLocaleString('vi-VN')} VND` : '';
            result.innerHTML = `
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                    <div>
                        <h3 class="h6 mb-1">${escapeHtml(plan.title)}</h3>
                        <div class="small text-muted">${escapeHtml(plan.destination)} - ${plan.days} ngày - ${plan.travelers} người${budget}</div>
                    </div>
                    <div class="text-end" data-cost-summary></div>
                </div>
                <div data-budget-alert></div>
                <div class="trip-builder-editor mt-3">
                    <aside class="trip-builder-days">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <strong>Ngày</strong>
                            <button class="btn btn-sm btn-outline-primary" type="button" data-add-day>+</button>
                        </div>
                        <div data-day-list></div>
                    </aside>
                    <main>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="h6 mb-0" data-active-day-title>Day 1</h4>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" type="button" data-save-now>Lưu ngay</button>
                                <a class="btn btn-sm btn-primary" href="/hotels/itinerary/${itineraryId}/book/" data-book-current>Đặt theo lịch trình</a>
                                <button class="btn btn-sm btn-outline-danger" type="button" data-delete-day>Xóa ngày</button>
                            </div>
                        </div>
                        <div data-activity-list></div>
                        <div class="dropdown mt-3">
                            <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">Thêm hoạt động</button>
                            <ul class="dropdown-menu">
                                <li><button class="dropdown-item" type="button" data-open-add-type="attraction">🏛 Attraction</button></li>
                                <li><button class="dropdown-item" type="button" data-open-add-type="transport">🚗 Transport</button></li>
                                <li><button class="dropdown-item" type="button" data-open-add-type="accommodation">🏨 Accommodation</button></li>
                                <li><button class="dropdown-item" type="button" data-open-add-type="food">🍜 Food</button></li>
                            </ul>
                        </div>
                        <div class="mt-3 d-none" data-specific-options-wrap>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <strong data-specific-options-title>Chọn hoạt động</strong>
                                <button class="btn btn-sm btn-outline-secondary" type="button" data-close-specific-options>Đóng</button>
                            </div>
                            <div class="row g-2" data-specific-options></div>
                        </div>
                    </main>
                </div>
            `;
            bindEditorControls();
            renderDaysAndActivities();
            updateCostSummary();
        }

        function bindEditorControls() {
            result.querySelector('[data-add-day]').addEventListener('click', function() {
                state.days.push({day: state.days.length + 1, activities: []});
                activeDayIndex = state.days.length - 1;
                renderDaysAndActivities();
                scheduleSave();
            });
            result.querySelector('[data-delete-day]').addEventListener('click', function() {
                if (state.days.length === 1) return;
                state.days.splice(activeDayIndex, 1);
                activeDayIndex = Math.max(0, activeDayIndex - 1);
                renderDaysAndActivities();
                scheduleSave();
            });
            result.querySelectorAll('[data-open-add-type]').forEach(function(button) {
                button.addEventListener('click', function() {
                    renderSpecificOptions(button.dataset.openAddType);
                });
            });
            result.querySelector('[data-close-specific-options]').addEventListener('click', function() {
                result.querySelector('[data-specific-options-wrap]').classList.add('d-none');
            });
            result.querySelector('[data-save-now]').addEventListener('click', function() {
                window.clearTimeout(saveTimer);
                save();
            });
        }

        function renderSpecificOptions(type) {
            const wrap = result.querySelector('[data-specific-options-wrap]');
            const title = result.querySelector('[data-specific-options-title]');
            const list = result.querySelector('[data-specific-options]');
            title.textContent = `${icons[type]} ${typeLabels[type]}`;
            list.innerHTML = '';
            suggestionOptions.filter(option => option.type === type).forEach(function(option) {
                const col = document.createElement('div');
                col.className = 'col-md-6';
                col.innerHTML = `
                    <button class="btn btn-outline-secondary text-start w-100 h-100" type="button">
                        <span class="fw-semibold">${escapeHtml(option.title)}</span>
                        <span class="d-block small text-muted">${escapeHtml(option.description)}</span>
                        <span class="d-block small">${formatVnd(option.estimated_cost)}</span>
                    </button>
                `;
                col.querySelector('button').addEventListener('click', function() {
                        state.days[activeDayIndex].activities.push(activityFromOption(option));
                        renderDaysAndActivities();
                        wrap.classList.add('d-none');
                        scheduleSave();
                    });
                list.appendChild(col);
            });
            wrap.classList.remove('d-none');
        }

        function renderDaysAndActivities() {
            const dayList = result.querySelector('[data-day-list]');
            const activityList = result.querySelector('[data-activity-list]');
            result.querySelector('[data-active-day-title]').textContent = `Day ${activeDayIndex + 1}`;
            dayList.innerHTML = '';
            state.days.forEach(function(day, index) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `trip-builder-day-btn ${index === activeDayIndex ? 'active' : ''}`;
                button.innerHTML = `<span>Day ${index + 1}</span><span class="text-muted small">${day.activities.length}</span>`;
                button.addEventListener('click', function() {
                    activeDayIndex = index;
                    renderDaysAndActivities();
                });
                dayList.appendChild(button);
            });
            activityList.innerHTML = '';
            state.days[activeDayIndex].activities.forEach(function(activity, index) {
                activityList.appendChild(renderActivity(activity, index));
            });
            updateCostSummary();
        }

        function renderActivity(activity, index) {
            const card = document.createElement('div');
            card.className = 'trip-activity-card';
            card.draggable = true;
            card.innerHTML = `
                <div class="trip-activity-grid align-items-start">
                    <div class="trip-drag-handle" title="Kéo để sắp xếp">☰</div>
                    <div class="fs-4">${icons[activity.type] || icons.attraction}</div>
                    <input class="form-control form-control-sm" type="time" value="${activity.time_start || ''}" data-field="time_start">
                    <input class="form-control form-control-sm activity-title" type="text" value="${escapeHtml(activity.title || '')}" placeholder="Tên hoạt động" data-field="title">
                    <input class="form-control form-control-sm activity-cost" type="number" min="0" step="10000" value="${activity.estimated_cost || 0}" data-field="estimated_cost">
                    <div class="dropdown activity-replace">
                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Thay thế</button>
                        <ul class="dropdown-menu replacement-menu"></ul>
                    </div>
                    <button class="btn btn-sm btn-outline-danger activity-delete" type="button" title="Xóa">×</button>
                    <div></div><div></div>
                    <textarea class="form-control form-control-sm activity-description" placeholder="Mô tả" data-field="description">${escapeHtml(activity.description || '')}</textarea>
                    <div class="small text-muted cost-preview">${formatVnd(activity.estimated_cost || 0)}</div>
                    <div class="d-flex gap-2">
                        <input class="form-control form-control-sm" type="url" value="${escapeHtml(activity.google_maps_url || '')}" placeholder="Map/link" data-field="google_maps_url">
                        ${activity.google_maps_url ? `<a class="btn btn-sm btn-outline-primary" target="_blank" rel="noopener" href="${escapeHtml(activity.google_maps_url)}">Mở</a>` : ''}
                    </div>
                </div>
            `;
            bindReplacementMenu(card, activity);
            card.querySelectorAll('[data-field]').forEach(function(input) {
                input.addEventListener('input', function() {
                    activity[input.dataset.field] = input.dataset.field === 'estimated_cost' ? Number(input.value || 0) : input.value;
                    if (input.dataset.field === 'estimated_cost') {
                        const preview = card.querySelector('.cost-preview');
                        if (preview) preview.textContent = formatVnd(input.value || 0);
                        updateCostSummary();
                    }
                    if (input.tagName === 'TEXTAREA') autosize(input);
                    scheduleSave();
                });
                if (input.tagName === 'TEXTAREA') autosize(input);
            });
            card.querySelector('.activity-delete').addEventListener('click', function() {
                state.days[activeDayIndex].activities.splice(index, 1);
                renderDaysAndActivities();
                scheduleSave();
            });
            card.addEventListener('dragstart', function() { draggedIndex = index; card.classList.add('dragging'); });
            card.addEventListener('dragend', function() { draggedIndex = null; card.classList.remove('dragging'); });
            card.addEventListener('dragover', function(event) { event.preventDefault(); });
            card.addEventListener('drop', function(event) {
                event.preventDefault();
                if (draggedIndex === null || draggedIndex === index) return;
                const activities = state.days[activeDayIndex].activities;
                const moved = activities.splice(draggedIndex, 1)[0];
                activities.splice(index, 0, moved);
                renderDaysAndActivities();
                scheduleSave();
            });
            return card;
        }

        function bindReplacementMenu(card, activity) {
            const replacementMenu = card.querySelector('.replacement-menu');
            const dayOptions = replacementOptions.filter(option => Number(option.day) === activeDayIndex + 1);
            const options = dayOptions.concat(suggestionOptions);
            if (!options.length) {
                replacementMenu.innerHTML = '<li><span class="dropdown-item-text text-muted small">Không có lựa chọn</span></li>';
                return;
            }
            options.forEach(function(option, index) {
                if (index === dayOptions.length && suggestionOptions.length) {
                    const divider = document.createElement('li');
                    divider.innerHTML = '<hr class="dropdown-divider"><h6 class="dropdown-header">Gợi ý thêm</h6>';
                    replacementMenu.appendChild(divider);
                }
                const item = document.createElement('li');
                item.innerHTML = `<button class="dropdown-item" type="button">${icons[option.type] || icons.attraction} ${escapeHtml(option.title)}<br><span class="small text-muted">${formatVnd(option.estimated_cost)}</span></button>`;
                item.querySelector('button').addEventListener('click', function() {
                    Object.assign(activity, activityFromOption(option));
                    renderDaysAndActivities();
                    scheduleSave();
                });
                replacementMenu.appendChild(item);
            });
        }

        function activityFromOption(option) {
            return {
                type: option.type || 'attraction',
                time_start: option.time_start || '',
                title: option.title || 'Hoạt động mới',
                description: option.description || '',
                estimated_cost: Number(option.estimated_cost || 0),
                google_maps_url: option.google_maps_url || ''
            };
        }

        function scheduleSave() {
            setSaveStatus('Đang lưu...', 'warning');
            window.clearTimeout(saveTimer);
            saveTimer = window.setTimeout(save, 1000);
        }

        function save() {
            fetch(`/api/itineraries/${itineraryId}/`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken(), 'X-Requested-With': 'XMLHttpRequest'},
                body: JSON.stringify({days: state.days})
            })
                .then(function(response) {
                    if (!response.ok) throw new Error('save failed');
                    return response.json();
                })
                .then(function(data) {
                    state.days = data.itinerary.days;
                    setSaveStatus('Đã lưu', 'success');
                    renderDaysAndActivities();
                })
                .catch(function() { setSaveStatus('Lỗi lưu', 'danger'); });
        }

        function updateCostSummary() {
            if (!state) return;
            const costPerPerson = state.days.reduce((total, day) => total + day.activities.reduce((dayTotal, activity) => dayTotal + Number(activity.estimated_cost || 0), 0), 0);
            const groupCost = costPerPerson * travelers;
            const summary = result.querySelector('[data-cost-summary]');
            const alertBox = result.querySelector('[data-budget-alert]');
            if (summary) {
                summary.innerHTML = `<strong>${groupCost.toLocaleString('vi-VN')} VND</strong><div class="small text-muted">${costPerPerson.toLocaleString('vi-VN')} VND/người</div>`;
            }
            if (!alertBox) return;
            if (requestedBudget && groupCost > requestedBudget) {
                alertBox.innerHTML = `<div class="alert alert-warning py-2">Vượt ngân sách khoảng ${(groupCost - requestedBudget).toLocaleString('vi-VN')} VND.</div>`;
            } else if (requestedBudget) {
                alertBox.innerHTML = `<div class="alert alert-success py-2">Trong ngân sách, còn ${(requestedBudget - groupCost).toLocaleString('vi-VN')} VND.</div>`;
            } else {
                alertBox.innerHTML = '';
            }
        }

        function setSaveStatus(text, variant) { saveStatus.textContent = text; saveStatus.className = `badge text-bg-${variant}`; }
        function csrfToken() { const match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/); return match ? decodeURIComponent(match[1]) : ''; }
        function autosize(textarea) { textarea.style.height = 'auto'; textarea.style.height = `${textarea.scrollHeight}px`; }
        function formatVnd(value) { return `${Number(value || 0).toLocaleString('vi-VN')} VND`; }
        function escapeHtml(value) { return String(value).replace(/[&<>"']/g, char => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}[char])); }

        function hydrateFromQueryString() {
            const params = new URLSearchParams(window.location.search);
            const destination = params.get('destination');
            if (!destination) return;
            form.elements.destination.value = destination;
            if (params.get('days')) form.elements.days.value = params.get('days');
            if (params.get('travelers')) form.elements.travelers.value = params.get('travelers');
            if (params.get('budget')) form.elements.budget.value = params.get('budget');
            if (params.get('from_chat') === '1' || params.get('autostart') === '1') {
                window.setTimeout(function() {
                    form.dispatchEvent(new Event('submit', {bubbles: true, cancelable: true}));
                }, 150);
            }
        }
    });
});
</script>
